x-app-environment: &app-environment
  APP_NAME: ${APP_NAME:-lead-conversion-sms-agent}
  ENV: ${ENV:-dev}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  AUTO_CREATE_TABLES: "false"
  DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/leads_db
  REDIS_URL: redis://redis:6379/0
  META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-meta-verify-token}
  LINKEDIN_VERIFY_TOKEN: ${LINKEDIN_VERIFY_TOKEN:-linkedin-verify-token}
  ADMIN_TOKEN: ${ADMIN_TOKEN:-change-me}
  ENABLE_DEMO_SEED: "${ENABLE_DEMO_SEED:-true}"
  RQ_EAGER: "${RQ_EAGER:-false}"
  RATE_LIMIT_COUNT: "${RATE_LIMIT_COUNT:-4}"
  RATE_LIMIT_WINDOW_MINUTES: "${RATE_LIMIT_WINDOW_MINUTES:-5}"
  AFTER_HOURS_FOLLOWUP_MINUTES: "${AFTER_HOURS_FOLLOWUP_MINUTES:-720}"
  TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
  TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
  TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
  PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
  AI_PROVIDER_MODE: ${AI_PROVIDER_MODE:-auto}

services:
  migrate:
    build: .
    command: alembic upgrade head
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment: *app-environment
    depends_on:
      seed-demo:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/app

  worker:
    build: .
    command: rq worker --with-scheduler
    environment: *app-environment
    depends_on:
      seed-demo:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./:/app

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: leads_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d leads_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  seed-demo:
    build: .
    command: python -m app.scripts.seed_demo
    environment: *app-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    volumes:
      - ./:/app

volumes:
  postgres_data:
